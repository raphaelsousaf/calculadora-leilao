name: Keep Supabase Alive

on:
  schedule:
    # Roda todo dia às 12:00 UTC (09:00 horário de Brasília)
    - cron: '0 12 * * *'
  workflow_dispatch: # permite rodar manualmente pelo painel do GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl --fail --silent --show-error \
            "${{ secrets.SUPABASE_URL }}/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
          echo "✅ Supabase pinged successfully"
